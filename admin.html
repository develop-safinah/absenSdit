<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Admin Absensi SDIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <!-- LOGIN -->
    <div class="row justify-content-center" id="loginBox">

        <div class="col-lg-4 col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="mb-2">
                        Admin Absensi
                    </h3>

                    <p class="text-muted">
                        Login untuk melihat rekap absensi SDIT Safinatunnajah.
                    </p>

                    <div class="mb-3">
                        <label class="form-label" for="email">
                            Email Admin
                        </label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            placeholder="Masukkan email admin">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="password">
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            placeholder="Masukkan password">
                    </div>

                    <button
                        id="btnLogin"
                        class="btn btn-primary w-100">
                        Login Admin
                    </button>

                     <div class="mt-3 ">
                      <a href="index.html" class="btn btn-outline-secondary btn-sm">
                          <i class="bi bi-person-lock"></i> Kembali
                      </a>
                     </div>
                    <div
                        id="loginPesan"
                        class="mt-3 text-center fw-bold">
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- PANEL ADMIN -->

    <div
        class="card shadow d-none"
        id="adminPanel">

        <div class="card-body">

            <!-- Header -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h3 class="mb-0">
                        Rekap Absensi
                    </h3>

                    <small class="text-muted">
                        SDIT Safinatunnajah
                    </small>

                </div>

                <div class="d-flex gap-2">

                    <a
                        href="pegawai.html"
                        class="btn btn-outline-primary">

                        👨‍💼 Kelola Pegawai

                    </a>

                    <button
                        id="btnLogout"
                        class="btn btn-outline-danger">

                        Logout

                    </button>

                </div>

            </div>

            <!-- Filter -->

            <div class="row g-3 align-items-end mb-4">

                <div class="col-lg-3">

                    <label class="form-label">
                        Dari Tanggal
                    </label>

                    <input
                        type="date"
                        id="tanggalMulai"
                        class="form-control">

                </div>

                <div class="col-lg-3">

                    <label class="form-label">
                        Sampai Tanggal
                    </label>

                    <input
                        type="date"
                        id="tanggalSelesai"
                        class="form-control">

                </div>

                <div class="col-lg-2">

                    <label class="form-label">
                        Keterangan
                    </label>

                    <select
                        id="filterKeterangan"
                        class="form-select">

                        <option value="">Semua</option>
                        <option value="Hadir">Hadir</option>
                        <option value="Terlambat">Terlambat</option>
                        <option value="Izin">Izin</option>
                        <option value="Sakit">Sakit</option>

                    </select>

                </div>

                <div class="col-lg-2 d-grid">

                    <button
                        id="btnTerapkan"
                        class="btn btn-primary">

                        Terapkan

                    </button>

                </div>

                <div class="col-lg-2 d-grid">

                    <button
                        id="btnExport"
                        class="btn btn-success">

                        Export CSV

                    </button>

                </div>

            </div>

            <!-- Summary -->

            <div class="row text-center mb-4">

                <div class="col">
                    <div class="card border-primary">
                        <div class="card-body">
                            <small>Total</small>
                            <h4 id="totalData">0</h4>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card border-success">
                        <div class="card-body">
                            <small>Hadir</small>
                            <h4 id="totalHadir">0</h4>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card border-warning">
                        <div class="card-body">
                            <small>Terlambat</small>
                            <h4 id="totalTerlambat">0</h4>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card border-info">
                        <div class="card-body">
                            <small>Izin</small>
                            <h4 id="totalIzin">0</h4>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card border-danger">
                        <div class="card-body">
                            <small>Sakit</small>
                            <h4 id="totalSakit">0</h4>
                        </div>
                    </div>
                </div>

            </div>

            <div
                id="adminPesan"
                class="text-center fw-bold mb-3">
            </div>

            <!-- Tabel -->

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-dark">

                        <tr>

                            <th>No</th>
                            <th>Tanggal</th>
                            <th>Jam</th>
                            <th>Nama Lengkap</th>
                            <th>Keterangan</th>
                            <th>Titik Koordinat</th>
                            <th>Akurasi</th>
                            <th>Jarak</th>
                            <th>Link Map</th>

                        </tr>

                    </thead>

                    <tbody id="tbodyAbsensi"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
