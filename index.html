<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi SDIT Safinatunnajah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">
    <div class="card">
      <div class="header">
        <div>
          <img src="logo/logo.png" alt="logo">
        </div>
        <h1>Absensi Kehadiran</h1>
        <p>SDIT Safinatunnajah</p>
      </div>

      <label for="namaLengkap">Nama Lengkap</label>
      <select id="namaLengkap">
        <option value="">-- Pilih Nama --</option>
        <option value="Lutfiah, S.Pd">Lutfiah, S.Pd</option>
        <option value="Siti Laelatul Lutfiah, S.Pd">Siti Laelatul Lutfiah, S.Pd</option>
        <option value="Elis Rosmiati">Elis Rosmiati</option>
        <option value="Widdi Agustini">Widdi Agustini</option>
        <option value="Malyya Azizah Nurfitria, S.Hum">Malyya Azizah Nurfitria, S.Hum</option>
        <option value="Iis Rodiatul Magpuroh, S.Pd">Iis Rodiatul Magpuroh, S.Pd</option>
        <option value="Nuraenah, S.Pd">Nuraenah, S.Pd</option>
        <option value="Raudotul Janah">Raudotul Janah</option>
        <option value="Tia Munjiah">Tia Munjiah</option>
        <option value="Aris Firdaus, S.H">Aris Firdaus, S.H</option>
        <option value="Ati Sulastri, S.Sos">Ati Sulastri, S.Sos</option>
        <option value="Rahmat, S.Pd">Rahmat, S.Pd</option>
        <option value="Siva Oktavianti">Siva Oktavianti</option>
        <option value="Suroji Anwar">Suroji Anwar</option>
        <option value="Esih Sukaesih">Esih Sukaesih</option>
        <option value="Rokayah">Rokayah</option>
        <option value="Fatihah Inayah">Fatihah Inayah</option>
        <option value="Rihhadatul Asyi">Rihhadatul Asyi</option>
      </select>

      <label for="keterangan">Keterangan</label>
      <select id="keterangan">
        <option value="">-- Pilih Keterangan --</option>
        <option value="Hadir">Hadir</option>
        <option value="Terlambat">Terlambat</option>
        <option value="Izin">Izin</option>
        <option value="Sakit">Sakit</option>
      </select>

      <button id="btnAbsen">Absen Sekarang</button>

      <div id="pesan"></div>

      <div class="note">
        Pastikan GPS/lokasi HP aktif. Gunakan Google Chrome. Saat muncul izin lokasi, pilih <strong>Izinkan</strong>.
      </div>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>

<script type="module" src="script.js"></script>
